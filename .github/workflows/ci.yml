name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lockfile-and-types:
    name: Lockfile + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Guard: fails if any package.json was changed without updating pnpm-lock.yaml.
      # This is what Coolify does with --frozen-lockfile in production.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lss/db run db:generate

      # Catch TypeScript errors across all 20 packages before they reach Coolify.
      - name: TypeScript check
        run: pnpm -r exec tsc --noEmit
