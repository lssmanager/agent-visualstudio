name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Install · TypeCheck · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── pnpm ──────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Fails immediately if any package.json was changed without updating
      # the lockfile — mirrors what Coolify does with --frozen-lockfile.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # ── Prisma generate (required before tsc) ─────────────────────────
      - name: Prisma generate
        run: pnpm exec prisma generate --schema=packages/db/prisma/schema.prisma

      # ── TypeScript ────────────────────────────────────────────────────
      - name: TypeScript check
        run: pnpm exec tsc -p tsconfig.json --noEmit --skipLibCheck

      # ── Build (API + Web) ─────────────────────────────────────────────
      - name: Build
        run: pnpm run build:ci
