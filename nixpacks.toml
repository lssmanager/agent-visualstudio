[variables]
NODE_ENV = "production"
NPM_CONFIG_PRODUCTION = "false"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["npm install --legacy-peer-deps --no-workspaces"]

[phases.build]
cmds = [
  "npm run build:deploy"
]

[start]
cmd = "npm run start:deploy"
