[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ['npm install --legacy-peer-deps --no-workspaces']

[phases.build]
cmds = [
  'npx prisma generate --schema=./apps/api/prisma/schema.prisma',
  'npm run build:api || ./node_modules/.bin/nest build --config apps/api/nest-cli.json || ./node_modules/.bin/tsc -p apps/api/tsconfig.build.json'
]

[start]
cmd = 'node /app/dist/apps/api/src/main.js'
