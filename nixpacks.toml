[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "pnpm install --frozen-lockfile"
]
cacheDirectories = ["/root/.local/share/pnpm/store/v3"]

[phases.build]
cmds = [
  "node_modules/.bin/prisma generate --schema=packages/db/prisma/schema.prisma",
  "tsc -p tsconfig.json --noEmitOnError false --skipLibCheck",
  "node_modules/.bin/vite build --config apps/web/vite.config.ts"
]
cacheDirectories = ["node_modules/.cache"]

[start]
cmd = "sh docker/start.sh"
