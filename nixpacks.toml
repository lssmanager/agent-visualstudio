[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ['npm install --legacy-peer-deps --include=dev']

[phases.build]
cmds = [
  './node_modules/.bin/prisma generate --schema=packages/db/prisma/schema.prisma || true',
  'npm run build --if-present'
]

[start]
cmd = 'npm start'
